<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StudyPlan">
  <meta name="description" content="Study Planner – Std 3 · First Assessment July 1, 2026">
  <title>Study Planner – Std 3</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#1a1a2e; --navy2:#0f3460; --white:#fff; --offwhite:#F8FAFC;
      --lgray:#f3f4f6; --mgray:#e5e7eb; --gray:#6b7280; --text:#1a1a2e;
      --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
      --nav-h:64px;
    }
    html{font-size:16px;scroll-behavior:smooth;}
    body{font-family:'Nunito',sans-serif;background:var(--offwhite);color:var(--text);
         min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

    /* ── App shell ── */
    #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

    /* ── Header ── */
    .app-header{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
      padding:calc(var(--safe-top) + 14px) 16px 0;
      color:#fff;position:sticky;top:0;z-index:100;
      box-shadow:0 2px 20px rgba(0,0,0,.3);
    }
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .header-icon{font-size:28px;line-height:1;}
    .header-titles{flex:1;}
    .header-main{font-size:18px;font-weight:900;letter-spacing:-.3px;}
    .header-sub{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;}

    /* Assessment countdown pill */
    .countdown-pill{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(220,38,38,.25);border:1px solid rgba(220,38,38,.5);
      border-radius:99px;padding:4px 12px;font-size:11px;font-weight:800;
      color:#FCA5A5;margin-top:2px;margin-bottom:8px;
    }

    /* ── Install banner ── */
    #install-banner{
      display:none;align-items:center;gap:10px;
      background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);
      border-radius:10px;padding:8px 12px;margin-bottom:10px;
      font-size:12px;color:rgba(255,255,255,.9);
    }
    #install-banner span{flex:1;font-weight:600;}
    #install-btn{background:#3B82F6;color:#fff;border:none;border-radius:8px;
      padding:5px 12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer;}
    #dismiss-install{background:transparent;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0 4px;}

    /* ── Tabs ── */
    .tab-bar{
      display:flex;gap:6px;padding:0 16px;
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
    }
    .tab-btn{
      flex:1;padding:8px 4px;border:none;border-radius:10px 10px 0 0;
      background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);
      font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;cursor:pointer;transition:all .2s;
    }
    .tab-btn.active{background:var(--offwhite);color:var(--navy);}

    /* ── Main ── */
    #main{flex:1;padding:14px 12px calc(var(--nav-h) + var(--safe-bot) + 14px);}
    .tab-content{display:flex;flex-direction:column;gap:10px;}

    /* ── Day scroll ── */
    .day-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    .day-scroll::-webkit-scrollbar{display:none;}
    .day-btn{
      flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:8px 14px;border-radius:12px;border:none;background:#fff;color:#555;
      font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;cursor:pointer;
      box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s;
    }
    .day-btn.active{color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.25);transform:translateY(-1px);}

    /* ── Day header ── */
    .day-header{border-radius:18px;padding:14px 16px;color:#fff;}
    .day-header-top{display:flex;align-items:flex-start;gap:12px;}
    .day-header-info{flex:1;}
    .day-name{font-size:22px;font-weight:900;line-height:1;margin-bottom:5px;}
    .day-note-text{font-size:11px;color:rgba(255,255,255,.7);line-height:1.4;font-style:italic;}
    .day-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .day-badge{background:rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;}

    /* ── Slots ── */
    .slots-list{display:flex;flex-direction:column;gap:8px;}
    .slot-break{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:10px;background:#f4f4f4;border:1px dashed #d1d5db;}
    .slot-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .15s,box-shadow .15s;}
    .slot-card:active{transform:scale(.99);}
    .slot-card.slot-key{box-shadow:0 3px 12px rgba(0,0,0,.12);border:1.5px solid #FCD34D;}
    .slot-card.slot-key .slot-card-body{background:#FFFBEB;}
    .slot-card-head{padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
    .slot-head-left{display:flex;align-items:center;gap:8px;}
    .slot-emoji{font-size:18px;}
    .slot-time-label{font-size:13px;font-weight:800;color:#fff;}
    .slot-head-right{display:flex;gap:5px;align-items:center;}
    .slot-pill{border-radius:99px;padding:2px 8px;font-size:10px;font-weight:800;}
    .key-pill{background:rgba(255,255,255,.3);color:#fff;}
    .dur-pill{background:rgba(0,0,0,.2);color:#fff;}
    .slot-card-body{padding:10px 14px;}
    .slot-subject-name{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:3px;}
    .slot-topic{font-size:12px;color:#374151;line-height:1.5;margin-bottom:5px;}
    .slot-sess-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}

    /* ── Flow card ── */
    .flow-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .flow-card-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:10px;}
    .flow-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
    .flow-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-top:5px;}
    .flow-info{flex:1;}
    .flow-time{font-size:10px;font-weight:800;line-height:1.2;}
    .flow-label{font-size:12px;color:#374151;line-height:1.3;}
    .flow-label.bold{font-weight:800;color:var(--navy);}

    /* ── Summer preview card ── */
    .summer-preview-card{
      background:#fff;border-radius:16px;overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,.07);border:1.5px solid #FED7AA;
    }
    .summer-preview-head{
      display:flex;align-items:center;gap:10px;padding:12px 14px;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      background:#FFF7ED;
    }
    .summer-slots{padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px;}
    .summer-slot{
      display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
      border-radius:12px;overflow:hidden;
    }
    .summer-slot-icon{
      width:32px;height:32px;border-radius:9px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;color:#fff;font-weight:900;
    }
    .summer-slot-info{flex:1;min-width:0;}
    .summer-slot-header{display:flex;justify-content:space-between;align-items:center;gap:6px;}
    .summer-slot-label{font-size:12px;font-weight:800;color:var(--navy);}
    .summer-slot-time{font-size:10px;font-weight:800;flex-shrink:0;}
    .summer-slot-note{font-size:11px;color:#4B5563;margin-top:2px;line-height:1.4;}

    /* ── Phase toggle ── */
    .phase-toggle{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    .phase-toggle::-webkit-scrollbar{display:none;}
    .phase-btn{
      flex-shrink:0;padding:8px 14px;border-radius:12px;border:2px solid var(--mgray);
      background:#fff;color:#555;font-family:'Nunito',sans-serif;font-weight:800;
      font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .phase-btn.active{color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.2);}

    /* ── Phase header ── */
    .phase-header{border-radius:18px;padding:14px 16px;color:#fff;margin-bottom:2px;}
    .phase-header-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;}
    .phase-title{font-size:17px;font-weight:900;line-height:1.2;}
    .phase-dates{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;}
    .phase-note{font-size:11px;color:rgba(255,255,255,.7);font-style:italic;line-height:1.4;padding-top:4px;border-top:1px solid rgba(255,255,255,.2);}

    /* ── Week cards ── */
    .week-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);}
    .week-head{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
    .week-title{font-size:14px;font-weight:900;color:#fff;}
    .week-tag{background:rgba(255,255,255,.2);color:#fff;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700;}
    .week-focus{padding:8px 14px;font-size:11px;font-weight:800;border-left:3px solid;background:#fafafa;line-height:1.4;}
    .week-rows{padding:6px 0;}
    .week-row{display:flex;gap:8px;padding:6px 14px;border-bottom:1px solid var(--lgray);align-items:flex-start;}
    .week-row:last-child{border-bottom:none;}
    .week-row-lbl{font-size:11px;font-weight:800;color:var(--gray);min-width:112px;flex-shrink:0;line-height:1.4;}
    .week-row-val{font-size:11px;color:#374151;line-height:1.5;flex:1;}

    /* ── Roadmap intro ── */
    .roadmap-intro{background:var(--navy);border-radius:16px;padding:14px 16px;color:#fff;}
    .roadmap-intro-title{font-size:16px;font-weight:900;margin-bottom:4px;}
    .roadmap-intro-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.4;}

    /* ── Summary ── */
    .summary-card{background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:16px;padding:14px;}
    .summary-title{font-size:13px;font-weight:900;color:#166534;margin-bottom:10px;}
    .sum-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .sum-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;}
    .sum-label{font-size:11px;color:#374151;flex:1;}
    .sum-time{font-size:12px;font-weight:900;}
    .sum-total{display:flex;justify-content:space-between;align-items:center;
      margin-top:10px;padding-top:10px;border-top:1.5px solid #BBF7D0;
      font-size:13px;font-weight:800;color:#166534;}
    .sum-note{font-size:11px;color:#16a34a;margin-top:4px;}

    /* ── Insights ── */
    .insights-intro{background:var(--navy);border-radius:16px;padding:14px 16px;color:#fff;}
    .insights-intro-title{font-size:16px;font-weight:900;margin-bottom:4px;}
    .insights-intro-sub{font-size:12px;color:rgba(255,255,255,.6);}
    .insight-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);}
    .insight-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .insight-head-left{display:flex;align-items:center;gap:10px;}
    .insight-title{font-size:13px;font-weight:800;color:#fff;line-height:1.3;}
    .insight-arrow{color:rgba(255,255,255,.8);font-size:16px;flex-shrink:0;}
    .insight-body{padding:12px 14px;font-size:13px;color:#374151;line-height:1.65;}

    /* ── Tips ── */
    .tips-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .tips-title{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:10px;}
    .tip-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--lgray);}
    .tip-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .tip-num{font-size:15px;font-weight:900;color:#3B82F6;flex-shrink:0;min-width:22px;}
    .tip-text{font-size:12px;color:#374151;line-height:1.55;}

    /* ── Bottom nav ── */
    .bottom-nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-bot));
      padding-bottom:var(--safe-bot);background:#fff;border-top:1px solid var(--mgray);
      display:flex;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.08);
    }
    .nav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      border:none;background:transparent;color:var(--gray);font-family:'Nunito',sans-serif;
      font-size:10px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .2s;
    }
    .nav-btn .nav-icon{font-size:22px;transition:transform .2s;}
    .nav-btn.active{color:var(--navy);}
    .nav-btn.active .nav-icon{transform:scale(1.15);}
    .nav-btn.active .nav-label{font-weight:900;}

    ::-webkit-scrollbar{display:none;}
    *{-webkit-tap-highlight-color:transparent;}

    @media (prefers-color-scheme:dark){
      body{background:#111827;color:#f9fafb;}
      .slot-card,.flow-card,.week-card,.tips-card,.insight-card,.summer-preview-card{background:#1f2937;}
      .slot-card-body{background:#1f2937;}
      .slot-card.slot-key .slot-card-body{background:#292524;}
      .day-btn:not(.active){background:#1f2937;color:#9ca3af;}
      .slot-subject-name,.flow-label.bold{color:#f9fafb;}
      .slot-topic,.flow-label,.week-row-val,.insight-body,.tip-text{color:#d1d5db;}
      .bottom-nav{background:#1f2937;border-top-color:#374151;}
      .nav-btn{color:#6b7280;}
      .nav-btn.active{color:#f9fafb;}
      .week-row{border-bottom-color:#374151;}
      .week-focus{background:#111827;}
      .tip-row{border-bottom-color:#374151;}
      .summer-preview-head{background:#1c1300;}
      .summer-slot-label{color:#f9fafb;}
      .phase-btn:not(.active){background:#1f2937;color:#9ca3af;border-color:#374151;}
    }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-top">
      <div class="header-icon">🎒</div>
      <div class="header-titles">
        <div class="header-main">Study Planner — Std 3</div>
        <div class="header-sub">2026–27 · First Assessment · 3 Phases · 11 Weeks</div>
      </div>
    </div>
    <div class="countdown-pill">🎯 Assessment: July 1, 2026 &nbsp;·&nbsp; Summer vacation: May 17 – Jun 21</div>
    <div id="install-banner">
      <span>📲 Add to home screen for offline access</span>
      <button id="install-btn">Install</button>
      <button id="dismiss-install">✕</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="schedule">📅 Schedule</button>
    <button class="tab-btn" data-tab="roadmap">🗺️ Roadmap</button>
    <button class="tab-btn" data-tab="insights">💡 Insights</button>
  </div>

  <main id="main"></main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="schedule">
      <span class="nav-icon">📅</span><span class="nav-label">Schedule</span>
    </button>
    <button class="nav-btn" data-tab="roadmap">
      <span class="nav-icon">🗺️</span><span class="nav-label">Roadmap</span>
    </button>
    <button class="nav-btn" data-tab="insights">
      <span class="nav-icon">💡</span><span class="nav-label">Insights</span>
    </button>
  </nav>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(r => console.log('SW:', r.scope))
        .catch(e => console.log('SW err:', e));
    });
  }
</script>
<script src="app.js"></script>
</body>
</html>
