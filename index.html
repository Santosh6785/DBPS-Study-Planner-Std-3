  <!-- ── Fonts ───────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg:        #F8FAFC;  --surface:  #ffffff;
      --text:      #1a1a2e;  --text2:    #374151;  --text3: #6b7280;
      --border:    #e5e7eb;  --border2:  #f3f4f6;
      --navy:      #1a1a2e;  --navy2:    #0f3460;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
      --nav-h:     64px;
    }
    @media (prefers-color-scheme: dark) {
      :root:not(.theme-light) {
        --bg:#111827; --surface:#1f2937; --text:#f9fafb;
        --text2:#d1d5db; --text3:#9ca3af; --border:#374151; --border2:#1f2937;
      }
    }
    body.theme-dark {
      --bg:#111827; --surface:#1f2937; --text:#f9fafb;
      --text2:#d1d5db; --text3:#9ca3af; --border:#374151; --border2:#1f2937;
    }
    body.theme-light {
      --bg:#F8FAFC; --surface:#ffffff; --text:#1a1a2e;
      --text2:#374151; --text3:#6b7280; --border:#e5e7eb; --border2:#f3f4f6;
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html  { font-size: 16px; scroll-behavior: smooth; }
    body  {
      font-family: 'Nunito', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background .25s, color .25s;
    }
    :focus-visible { outline: 3px solid #3B82F6; outline-offset: 2px; border-radius: 6px; }
    :not(:focus-visible) { outline: none; }
    * { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }

    /* ── App ───────────────────────────────────────── */
    #app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

    /* ── Skeleton loader ───────────────────────────── */
    #skeleton {
      position: fixed; inset: 0; z-index: 999;
      background: var(--navy); display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:12px;
      transition: opacity .3s;
    }
    .sk-icon  { font-size:48px; animation: sk-bounce .8s infinite alternate; }
    .sk-text  { color:rgba(255,255,255,.7); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; }
    .sk-bar   { width:160px; height:4px; background:rgba(255,255,255,.15); border-radius:99px; overflow:hidden; }
    .sk-fill  { height:100%; width:40%; background:#3B82F6; border-radius:99px;
                animation: sk-slide 1s ease-in-out infinite alternate; }
    @keyframes sk-bounce { from { transform:translateY(0); } to { transform:translateY(-8px); } }
    @keyframes sk-slide  { from { margin-left:0; } to { margin-left:60%; } }

    /* ── Header ────────────────────────────────────── */
    .app-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: calc(var(--safe-top) + 12px) 14px 0;
      color:#fff; position:sticky; top:0; z-index:100;
      box-shadow: 0 2px 20px rgba(0,0,0,.35);
    }
    .header-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .header-icon { font-size:24px; line-height:1; flex-shrink:0; }
    .header-titles { flex:1; min-width:0; }
    .header-main { font-size:16px; font-weight:900; letter-spacing:-.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .header-sub  { font-size:10px; color:rgba(255,255,255,.6); font-weight:600; }
    .header-actions { display:flex; gap:6px; flex-shrink:0; }
    .header-icon-btn {
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
      border-radius:8px; padding:5px 7px; font-size:15px; cursor:pointer; color:#fff; line-height:1;
    }

    .countdown-pill {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(220,38,38,.2); border:1px solid rgba(220,38,38,.45);
      border-radius:99px; padding:4px 12px; font-size:11px;
      font-weight:800; color:#FCA5A5; margin-bottom:8px;
    }

    #install-banner {
      display:none; align-items:center; gap:10px;
      background:rgba(59,130,246,.15); border:1px solid rgba(59,130,246,.4);
      border-radius:10px; padding:8px 12px; margin-bottom:8px;
      font-size:12px; color:rgba(255,255,255,.9);
    }
    #install-banner span { flex:1; font-weight:600; }
    #install-btn {
      background:#3B82F6; color:#fff; border:none; border-radius:8px;
      padding:5px 12px; font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; cursor:pointer;
    }
    #dismiss-install { background:transparent; border:none; color:rgba(255,255,255,.5); font-size:18px; cursor:pointer; padding:0 4px; }

    /* ── Tab bar ───────────────────────────────────── */
    .tab-bar { display:flex; gap:6px; padding:0 14px; background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%); }
    .tab-btn { flex:1; padding:8px 4px; border:none; border-radius:10px 10px 0 0; background:rgba(255,255,255,.1); color:rgba(255,255,255,.6); font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; cursor:pointer; transition:all .2s; }
    .tab-btn.active { background:var(--bg); color:var(--text); }

    /* ── Main ──────────────────────────────────────── */
    #main { flex:1; padding:12px 12px calc(var(--nav-h) + var(--safe-bot) + 14px); transition:opacity .15s; }
    .tab-content { display:flex; flex-direction:column; gap:10px; }

    /* ── Day scroll (snap) ─────────────────────────── */
    .day-scroll {
      display:flex; gap:7px; overflow-x:auto; padding-bottom:4px;
      align-items:center; scrollbar-width:none;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .day-btn {
      flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:2px;
      padding:8px 12px; border-radius:12px; border:none;
      background:var(--surface); color:var(--text3);
      font-family:'Nunito',sans-serif; font-weight:800; font-size:11px;
      cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.08);
      transition:all .2s; position:relative;
      scroll-snap-align: start;
    }
    .day-btn.active { color:#fff; box-shadow:0 4px 12px rgba(0,0,0,.25); transform:translateY(-1px); }
    .today-dot { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:5px; height:5px; border-radius:50%; background:#F59E0B; }
    .day-btn.active .today-dot { background:rgba(255,255,255,.8); }
    .today-btn { flex-shrink:0; padding:6px 12px; border-radius:12px; border:1.5px solid #3B82F6; background:var(--surface); color:#3B82F6; font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; cursor:pointer; white-space:nowrap; }

    /* Mini progress indicator on day button */
    .day-prog { font-size:9px; font-weight:800; color:#fff; border-radius:99px; padding:1px 5px; min-width:26px; text-align:center; margin-top:1px; }

    /* ── Day header ────────────────────────────────── */
    .day-header { border-radius:18px; padding:14px 16px; color:#fff; }
    .day-header-top { display:flex; align-items:flex-start; gap:12px; }
    .day-header-info { flex:1; }
    .day-name { font-size:22px; font-weight:900; line-height:1; margin-bottom:5px; }
    .day-note-text { font-size:11px; color:rgba(255,255,255,.7); line-height:1.4; font-style:italic; }
    .day-badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .day-badge { background:rgba(255,255,255,.15); border-radius:99px; padding:4px 12px; font-size:12px; font-weight:700; }
    .day-progress-bar-wrap { height:5px; background:rgba(255,255,255,.2); border-radius:99px; margin-top:10px; overflow:hidden; }
    .day-progress-bar { height:100%; border-radius:99px; transition:width .4s ease; }

    /* ── Slots ─────────────────────────────────────── */
    .slots-list { display:flex; flex-direction:column; gap:8px; }
    .slot-break { display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:10px; background:var(--border2); border:1px dashed var(--border); }
    .slot-card { background:var(--surface); border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.07); transition:transform .15s,box-shadow .15s,opacity .2s; }
    .slot-card:active { transform:scale(.99); }
    .slot-card.slot-key { box-shadow:0 3px 12px rgba(0,0,0,.12); border:1.5px solid #FCD34D; }
    .slot-card.slot-key .slot-card-body { background:#FFFBEB; }
    .slot-card.slot-done { opacity:.7; }
    .slot-card.slot-done .slot-card-body { background:var(--border2) !important; }
    body.theme-dark .slot-card.slot-key .slot-card-body { background:#292524; }

    .slot-card-head { padding:9px 12px; display:flex; justify-content:space-between; align-items:center; }
    .slot-head-left { display:flex; align-items:center; gap:8px; }
    .slot-emoji { font-size:18px; }
    .slot-time-label { font-size:13px; font-weight:800; color:#fff; }
    .slot-head-right { display:flex; gap:5px; align-items:center; }
    .slot-pill { border-radius:99px; padding:2px 8px; font-size:10px; font-weight:800; }
    .key-pill  { background:rgba(255,255,255,.3); color:#fff; }
    .dur-pill  { background:rgba(0,0,0,.2); color:#fff; }
    .done-pill { background:rgba(255,255,255,.3); color:#fff; }

    .slot-card-body { padding:10px 14px; }
    .slot-subject-name { font-size:14px; font-weight:900; margin-bottom:3px; transition:color .2s; }
    .slot-topic { font-size:12px; line-height:1.5; margin-bottom:7px; transition:color .2s,text-decoration .2s; }
    .slot-footer { display:flex; justify-content:space-between; align-items:center; }
    .slot-sess-badge { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }

    /* Checkbox */
    .done-label { display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
    .done-check { width:16px; height:16px; accent-color:#22C55E; cursor:pointer; flex-shrink:0; }
    .done-check-label { font-size:11px; font-weight:800; color:#22C55E; }
    .slot-card.slot-done .done-check-label { color:#9CA3AF; }

    /* ── Flow card ─────────────────────────────────── */
    .flow-card { background:var(--surface); border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .flow-card-title { font-size:13px; font-weight:900; color:var(--text); margin-bottom:10px; }
    .flow-row { display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
    .flow-dot { width:8px; height:8px; border-radius:99px; flex-shrink:0; margin-top:5px; }
    .flow-info { flex:1; }
    .flow-time { font-size:10px; font-weight:800; line-height:1.2; }
    .flow-label { font-size:12px; color:var(--text2); line-height:1.3; }
    .flow-label.bold { font-weight:800; color:var(--text); }

    /* ── Summer card ───────────────────────────────── */
    .summer-preview-card { background:var(--surface); border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.07); border:1.5px solid #FED7AA; }
    .summer-preview-head { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; background:#FFF7ED; }
    body.theme-dark .summer-preview-head { background:#1c1300; }
    .summer-slots { padding:8px 10px 10px; display:flex; flex-direction:column; gap:5px; }
    .summer-slot { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:12px; }
    .summer-slot-icon { width:32px; height:32px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; font-weight:900; }
    .summer-slot-info { flex:1; min-width:0; }
    .summer-slot-header { display:flex; justify-content:space-between; align-items:center; gap:6px; }
    .summer-slot-label { font-size:12px; font-weight:800; color:var(--text); }
    .summer-slot-time { font-size:10px; font-weight:800; flex-shrink:0; }
    .summer-slot-note { font-size:11px; color:var(--text2); margin-top:2px; line-height:1.4; }

    /* ── Overall progress bar ──────────────────────── */
    .overall-progress-card { background:var(--surface); border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .overall-progress-title { font-size:13px; font-weight:800; color:var(--text); margin-bottom:8px; }
    .overall-bar-track { height:10px; background:var(--border2); border-radius:99px; overflow:hidden; margin-bottom:6px; }
    .overall-bar-fill { height:100%; background:linear-gradient(90deg,#3B82F6,#22C55E); border-radius:99px; transition:width .5s ease; }
    .overall-bar-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text3); font-weight:700; }

    /* ── Roadmap ───────────────────────────────────── */
    .roadmap-intro { background:var(--navy); border-radius:16px; padding:14px 16px; color:#fff; }
    .roadmap-intro-title { font-size:16px; font-weight:900; margin-bottom:4px; }
    .roadmap-intro-sub { font-size:12px; color:rgba(255,255,255,.6); line-height:1.4; }

    .phase-toggle { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
    .phase-btn { flex-shrink:0; padding:8px 14px; border-radius:12px; border:2px solid var(--border); background:var(--surface); color:var(--text3); font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .phase-btn.active { color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.2); }
    .phase-btn.current-phase { border-color:#F59E0B; }

    .phase-header { border-radius:18px; padding:14px 16px; color:#fff; }
    .phase-header-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
    .phase-title { font-size:17px; font-weight:900; line-height:1.2; }
    .phase-dates { font-size:12px; color:rgba(255,255,255,.7); margin-top:3px; }
    .phase-note  { font-size:11px; color:rgba(255,255,255,.7); font-style:italic; line-height:1.4; padding-top:6px; border-top:1px solid rgba(255,255,255,.2); }

    .week-card { background:var(--surface); border-radius:18px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.07); transition:box-shadow .2s; }
    .week-card.week-current { box-shadow:0 0 0 3px #F59E0B, 0 4px 16px rgba(0,0,0,.15); }
    .week-card.week-past    { opacity:.7; }
    .week-head { padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
    .week-title { font-size:14px; font-weight:900; color:#fff; }
    .week-tag   { background:rgba(255,255,255,.2); color:#fff; border-radius:99px; padding:2px 10px; font-size:11px; font-weight:700; }
    .week-focus { padding:8px 14px; font-size:11px; font-weight:800; border-left:3px solid; background:var(--border2); line-height:1.4; }
    .week-rows  { padding:6px 0; }
    .week-row   { display:flex; gap:8px; padding:6px 14px; border-bottom:1px solid var(--border2); align-items:flex-start; }
    .week-row:last-child { border-bottom:none; }
    .week-row-lbl { font-size:11px; font-weight:800; color:var(--text3); min-width:112px; flex-shrink:0; line-height:1.4; }
    .week-row-val { font-size:11px; color:var(--text2); line-height:1.5; flex:1; }

    .summary-card { background:#F0FDF4; border:1.5px solid #86EFAC; border-radius:16px; padding:14px; }
    body.theme-dark .summary-card { background:#052e16; }
    .summary-title { font-size:13px; font-weight:900; color:#166534; margin-bottom:10px; }
    .sum-row   { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .sum-dot   { width:8px; height:8px; border-radius:99px; flex-shrink:0; }
    .sum-label { font-size:11px; color:var(--text2); flex:1; }
    .sum-time  { font-size:12px; font-weight:900; }
    .sum-total { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1.5px solid #BBF7D0; font-size:13px; font-weight:800; color:#166534; }
    .sum-note  { font-size:11px; color:#16a34a; margin-top:4px; }

    /* ── Insights ──────────────────────────────────── */
    .insights-intro { background:var(--navy); border-radius:16px; padding:14px 16px; color:#fff; }
    .insights-intro-title { font-size:16px; font-weight:900; margin-bottom:4px; }
    .insights-intro-sub   { font-size:12px; color:rgba(255,255,255,.6); }
    .insight-card { background:var(--surface); border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.07); }
    .insight-head { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .insight-head-left { display:flex; align-items:center; gap:10px; }
    .insight-title { font-size:13px; font-weight:800; color:#fff; line-height:1.3; }
    .insight-arrow { color:rgba(255,255,255,.8); font-size:16px; flex-shrink:0; }
    .insight-body  { padding:12px 14px; font-size:13px; color:var(--text2); line-height:1.65; }

    .tips-card  { background:var(--surface); border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .tips-title { font-size:14px; font-weight:900; color:var(--text); margin-bottom:10px; }
    .tip-row    { display:flex; gap:8px; align-items:flex-start; margin-bottom:9px; padding-bottom:9px; border-bottom:1px solid var(--border2); }
    .tip-row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .tip-num    { font-size:15px; font-weight:900; color:#3B82F6; flex-shrink:0; min-width:22px; }
    .tip-text   { font-size:12px; color:var(--text2); line-height:1.55; }

    /* ── Bottom nav ────────────────────────────────── */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:480px; height:calc(var(--nav-h) + var(--safe-bot));
      padding-bottom:var(--safe-bot); background:var(--surface);
      border-top:1px solid var(--border); display:flex; z-index:200;
      box-shadow:0 -4px 20px rgba(0,0,0,.08);
    }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border:none; background:transparent; color:var(--text3); font-family:'Nunito',sans-serif; font-size:10px; font-weight:700; cursor:pointer; transition:color .2s; }
    .nav-btn .nav-icon { font-size:22px; transition:transform .2s; }
    .nav-btn.active { color:var(--text); }
    .nav-btn.active .nav-icon { transform:scale(1.15); }
    .nav-btn.active .nav-label { font-weight:900; }

    /* ── Onboarding modal ──────────────────────────── */
    #onboarding-overlay {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
      display:flex; align-items:flex-end; justify-content:center;
      padding:0 12px 12px;
      animation: fade-in .25s ease;
    }
    @keyframes fade-in { from { opacity:0; } to { opacity:1; } }
    .onboard-card {
      background:var(--surface); border-radius:24px; padding:20px 20px 16px;
      width:100%; max-width:460px;
      animation: slide-up .3s ease;
      max-height:90vh; overflow-y:auto;
    }
    @keyframes slide-up { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .onboard-icon  { font-size:40px; text-align:center; margin-bottom:6px; }
    .onboard-title { font-size:18px; font-weight:900; color:var(--text); text-align:center; margin-bottom:14px; }
    .onboard-steps { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
    .onboard-step  { display:flex; flex-direction:column; gap:2px; padding:10px 12px; background:var(--border2); border-radius:12px; }
    .onboard-step-title { font-size:13px; font-weight:800; color:var(--text); }
    .onboard-step-desc  { font-size:12px; color:var(--text2); line-height:1.4; }
    .onboard-btn {
      width:100%; padding:14px; border:none; border-radius:14px;
      background:linear-gradient(135deg,#3B82F6,#6366F1); color:#fff;
      font-family:'Nunito',sans-serif; font-size:15px; font-weight:900;
      cursor:pointer; transition:transform .15s,box-shadow .15s;
      box-shadow:0 4px 14px rgba(59,130,246,.4);
    }
    .onboard-btn:active { transform:scale(.98); }
  </style>
</head>
<body>

<!-- ── Loading skeleton ───────────────────────────── -->
<div id="skeleton" role="status" aria-label="Loading study planner">
  <div class="sk-icon" aria-hidden="true">🎒</div>
  <div class="sk-text">Loading your study planner…</div>
  <div class="sk-bar"><div class="sk-fill"></div></div>
</div>

<div id="app">
  <header class="app-header" role="banner">
    <div class="header-top">
      <div class="header-icon" aria-hidden="true">🎒</div>
      <div class="header-titles">
        <div class="header-main">Study Planner — Std 3</div>
        <div class="header-sub">DBPS 2026–27 · 3 Phases · 11 Weeks</div>
      </div>
      <div class="header-actions">
        <button id="help-btn"  class="header-icon-btn" aria-label="How to use this app" title="Help / Tour">❓</button>
        <button id="theme-btn" class="header-icon-btn" aria-label="Toggle dark / light mode" title="Toggle theme">🌗</button>
      </div>
    </div>
    <div class="countdown-pill" role="status" aria-live="polite">
      🎯 Assessment: July 1, 2026 &nbsp;·&nbsp; Summer: May 17 – Jun 21
    </div>
    <div id="install-banner" role="banner" aria-label="Install app prompt">
      <span>📲 Add to home screen for offline access</span>
      <button id="install-btn" aria-label="Install app">Install</button>
      <button id="dismiss-install" aria-label="Dismiss">✕</button>
    </div>
  </header>

  <div class="tab-bar" role="tablist" aria-label="Main sections">
    <button class="tab-btn active" data-tab="schedule" role="tab" aria-selected="true">📅 Schedule</button>
    <button class="tab-btn"        data-tab="roadmap"  role="tab" aria-selected="false">🗺️ Roadmap</button>
    <button class="tab-btn"        data-tab="insights" role="tab" aria-selected="false">💡 Insights</button>
  </div>

  <main id="main" role="main" aria-live="polite" aria-label="Main content"></main>

  <nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
    <button class="nav-btn active" data-tab="schedule" role="tab" aria-selected="true"  aria-label="Schedule">
      <span class="nav-icon" aria-hidden="true">📅</span><span class="nav-label">Schedule</span>
    </button>
    <button class="nav-btn"        data-tab="roadmap"  role="tab" aria-selected="false" aria-label="Roadmap">
      <span class="nav-icon" aria-hidden="true">🗺️</span><span class="nav-label">Roadmap</span>
    </button>
    <button class="nav-btn"        data-tab="insights" role="tab" aria-selected="false" aria-label="Insights">
      <span class="nav-icon" aria-hidden="true">💡</span><span class="nav-label">Insights</span>
    </button>
  </nav>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(r  => console.log('SW:', r.scope))
        .catch(e => console.warn('SW error:', e));
    });
  }
</script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
